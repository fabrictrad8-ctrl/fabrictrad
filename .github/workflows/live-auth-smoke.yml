name: Live role authentication smoke tests

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

jobs:
  live-auth:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Verify production domains and role isolation
        id: smoke
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail

          verify_domain() {
            base_url="$1"
            safe_name=$(echo "$base_url" | sed 's#https://##; s#[^a-zA-Z0-9]#-#g')
            deployed=false

            for attempt in $(seq 1 40); do
              status=$(curl --silent --show-error --connect-timeout 10 --max-time 30 \
                --output "/tmp/${safe_name}-deploy.json" --write-out '%{http_code}' \
                --header 'Content-Type: application/json' \
                --data '{"email":"demo.buyer@fabrictrad.com","password":"FabricDemo@2026"}' \
                "$base_url/api/auth/demo-session" || true)
              if [ "$status" = "200" ] && grep -q '"role":"buyer"' "/tmp/${safe_name}-deploy.json"; then
                deployed=true
                break
              fi
              echo "Attempt $attempt: $base_url returned $status; waiting for Cloudflare deployment"
              sleep 15
            done

            if [ "$deployed" != "true" ]; then
              echo "$base_url did not serve the new demo-session endpoint in time."
              cat "/tmp/${safe_name}-deploy.json" 2>/dev/null || true
              return 1
            fi

            buyer_status=$(curl --silent --show-error --connect-timeout 10 --max-time 30 \
              --output "/tmp/${safe_name}-buyer-session.json" --write-out '%{http_code}' \
              --cookie-jar "/tmp/${safe_name}-buyer.cookies" --header 'Content-Type: application/json' \
              --data '{"email":"demo.buyer@fabrictrad.com","password":"FabricDemo@2026"}' \
              "$base_url/api/auth/demo-session")
            test "$buyer_status" = "200"
            grep -q '"role":"buyer"' "/tmp/${safe_name}-buyer-session.json"

            buyer_dashboard_status=$(curl --silent --show-error --connect-timeout 10 --max-time 30 \
              --output "/tmp/${safe_name}-buyer-dashboard.html" --write-out '%{http_code}' \
              --cookie "/tmp/${safe_name}-buyer.cookies" --max-redirs 0 "$base_url/buyer-dashboard")
            test "$buyer_dashboard_status" = "200"

            buyer_to_seller_status=$(curl --silent --show-error --connect-timeout 10 --max-time 30 \
              --dump-header "/tmp/${safe_name}-buyer-to-seller.headers" --output /dev/null \
              --write-out '%{http_code}' --cookie "/tmp/${safe_name}-buyer.cookies" --max-redirs 0 \
              "$base_url/seller-dashboard")
            test "$buyer_to_seller_status" = "307" -o "$buyer_to_seller_status" = "308"
            grep -qi '^location: .*buyer-dashboard' "/tmp/${safe_name}-buyer-to-seller.headers"

            seller_status=$(curl --silent --show-error --connect-timeout 10 --max-time 30 \
              --output "/tmp/${safe_name}-seller-session.json" --write-out '%{http_code}' \
              --cookie-jar "/tmp/${safe_name}-seller.cookies" --header 'Content-Type: application/json' \
              --data '{"email":"demo.seller@fabrictrad.com","password":"FabricDemo@2026"}' \
              "$base_url/api/auth/demo-session")
            test "$seller_status" = "200"
            grep -q '"role":"seller"' "/tmp/${safe_name}-seller-session.json"

            seller_dashboard_status=$(curl --silent --show-error --connect-timeout 10 --max-time 30 \
              --output "/tmp/${safe_name}-seller-dashboard.html" --write-out '%{http_code}' \
              --cookie "/tmp/${safe_name}-seller.cookies" --max-redirs 0 "$base_url/seller-dashboard")
            test "$seller_dashboard_status" = "200"

            seller_to_buyer_status=$(curl --silent --show-error --connect-timeout 10 --max-time 30 \
              --dump-header "/tmp/${safe_name}-seller-to-buyer.headers" --output /dev/null \
              --write-out '%{http_code}' --cookie "/tmp/${safe_name}-seller.cookies" --max-redirs 0 \
              "$base_url/buyer-dashboard")
            test "$seller_to_buyer_status" = "307" -o "$seller_to_buyer_status" = "308"
            grep -qi '^location: .*seller-dashboard' "/tmp/${safe_name}-seller-to-buyer.headers"

            public_marketplace_status=$(curl --silent --show-error --connect-timeout 10 --max-time 30 \
              --dump-header "/tmp/${safe_name}-public-marketplace.headers" --output /dev/null \
              --write-out '%{http_code}' --max-redirs 0 "$base_url/marketplace")
            test "$public_marketplace_status" = "307" -o "$public_marketplace_status" = "308"
            grep -qi '^location: .*login' "/tmp/${safe_name}-public-marketplace.headers"

            admin_login_status=$(curl --silent --show-error --connect-timeout 10 --max-time 30 \
              --output "/tmp/${safe_name}-admin-login.html" --write-out '%{http_code}' \
              "$base_url/admin-login")
            test "$admin_login_status" = "200"

            invalid_status=$(curl --silent --show-error --connect-timeout 10 --max-time 30 \
              --output "/tmp/${safe_name}-invalid-demo.json" --write-out '%{http_code}' \
              --header 'Content-Type: application/json' \
              --data '{"email":"demo.buyer@fabrictrad.com","password":"incorrect"}' \
              "$base_url/api/auth/demo-session")
            test "$invalid_status" = "401"

            echo "$base_url passed live authentication checks."
          }

          verify_domain 'https://fabrictrad.com'
          verify_domain 'https://www.fabrictrad.com'

      - name: Publish verification status on the commit
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SMOKE_OUTCOME: ${{ steps.smoke.outcome }}
        run: |
          set -euo pipefail
          if [ "$SMOKE_OUTCOME" = "success" ]; then
            state=success
            description='Both production domains passed buyer, seller and admin route checks'
          else
            state=failure
            description='A production domain or role authentication check failed'
          fi
          payload=$(printf '{"state":"%s","context":"fabrictrad/live-auth","description":"%s"}' "$state" "$description")
          curl --fail --silent --show-error \
            --request POST \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header 'Accept: application/vnd.github+json' \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            --data "$payload" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" > /dev/null

      - name: Fail when the live verification failed
        if: steps.smoke.outcome != 'success'
        run: exit 1
