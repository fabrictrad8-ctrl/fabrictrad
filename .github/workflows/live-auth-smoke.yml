name: Live verified-email authentication smoke tests

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

jobs:
  live-auth:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Verify production domains and protected entry points
        id: smoke
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail

          verify_domain() {
            base_url="$1"
            safe_name=$(echo "$base_url" | sed 's#https://##; s#[^a-zA-Z0-9]#-#g')
            deployed=false

            for attempt in $(seq 1 40); do
              login_status=$(curl --silent --show-error --connect-timeout 10 --max-time 30 \
                --output "/tmp/${safe_name}-login.html" --write-out '%{http_code}' \
                "$base_url/login" || true)

              if [ "$login_status" = "200" ] \
                && grep -q 'Sign in to FabricTrad' "/tmp/${safe_name}-login.html" \
                && grep -q 'Send sign-in code' "/tmp/${safe_name}-login.html" \
                && ! grep -qi 'Explore a demo' "/tmp/${safe_name}-login.html"; then
                deployed=true
                break
              fi

              echo "Attempt $attempt: $base_url has not served the verified-email login yet"
              sleep 15
            done

            if [ "$deployed" != "true" ]; then
              echo "$base_url did not serve the updated login in time."
              cat "/tmp/${safe_name}-login.html" 2>/dev/null || true
              return 1
            fi

            if grep -qi 'Admin portal' "/tmp/${safe_name}-login.html"; then
              echo "$base_url still exposes a separate administrator entry point."
              return 1
            fi

            home_status=$(curl --silent --show-error --connect-timeout 10 --max-time 30 \
              --output "/tmp/${safe_name}-home.html" --write-out '%{http_code}' "$base_url/")
            test "$home_status" = "200"
            if grep -qi 'Admin workspace' "/tmp/${safe_name}-home.html"; then
              echo "$base_url still advertises the administrator workspace publicly."
              return 1
            fi

            public_marketplace_status=$(curl --silent --show-error --connect-timeout 10 --max-time 30 \
              --dump-header "/tmp/${safe_name}-public-marketplace.headers" --output /dev/null \
              --write-out '%{http_code}' --max-redirs 0 "$base_url/marketplace")
            test "$public_marketplace_status" = "307" -o "$public_marketplace_status" = "308"
            grep -qi '^location: .*login' "/tmp/${safe_name}-public-marketplace.headers"

            admin_login_status=$(curl --silent --show-error --connect-timeout 10 --max-time 30 \
              --dump-header "/tmp/${safe_name}-admin-login.headers" --output /dev/null \
              --write-out '%{http_code}' --max-redirs 0 "$base_url/admin-login")
            test "$admin_login_status" = "307" -o "$admin_login_status" = "308"
            grep -qi '^location: .*login' "/tmp/${safe_name}-admin-login.headers"

            invalid_otp_status=$(curl --silent --show-error --connect-timeout 10 --max-time 30 \
              --output "/tmp/${safe_name}-invalid-otp.json" --write-out '%{http_code}' \
              --header 'Content-Type: application/json' --data '{}' \
              "$base_url/api/auth/email-otp/request")
            test "$invalid_otp_status" = "400"
            grep -q 'Email is required' "/tmp/${safe_name}-invalid-otp.json"

            disabled_demo_status=$(curl --silent --show-error --connect-timeout 10 --max-time 30 \
              --output "/tmp/${safe_name}-disabled-demo.txt" --write-out '%{http_code}' \
              --header 'Content-Type: application/json' \
              --data '{"email":"demo.buyer@fabrictrad.com","password":"FabricDemo@2026"}' \
              "$base_url/api/auth/demo-session")
            test "$disabled_demo_status" = "404"

            echo "$base_url passed verified-email authentication checks."
          }

          verify_domain 'https://fabrictrad.com'
          verify_domain 'https://www.fabrictrad.com'

      - name: Publish verification status on the commit
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SMOKE_OUTCOME: ${{ steps.smoke.outcome }}
        run: |
          set -euo pipefail
          if [ "$SMOKE_OUTCOME" = "success" ]; then
            state=success
            description='Both production domains passed verified-email access checks'
          else
            state=failure
            description='A production domain or verified-email access check failed'
          fi
          payload=$(printf '{"state":"%s","context":"fabrictrad/live-auth","description":"%s"}' "$state" "$description")
          curl --fail --silent --show-error \
            --request POST \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header 'Accept: application/vnd.github+json' \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            --data "$payload" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" > /dev/null

      - name: Fail when the live verification failed
        if: steps.smoke.outcome != 'success'
        run: exit 1
