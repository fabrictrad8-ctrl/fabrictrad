name: Verify live AI drape-on

on:
  pull_request:
  push:
    branches:
      - 'agent/verify-live-ai-drape'

permissions:
  contents: read

jobs:
  secrets:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Report configured provider secret names
        shell: bash
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPEN_AI_API_KEY: ${{ secrets.OPEN_AI_API_KEY }}
          OPENAI_KEY: ${{ secrets.OPENAI_KEY }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          ROCKET_API_KEY: ${{ secrets.ROCKET_API_KEY }}
          ROCKETNEW_API_KEY: ${{ secrets.ROCKETNEW_API_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          for name in OPENAI_API_KEY OPEN_AI_API_KEY OPENAI_KEY AI_API_KEY GEMINI_API_KEY GOOGLE_API_KEY ROCKET_API_KEY ROCKETNEW_API_KEY CLOUDFLARE_API_TOKEN; do
            if [ -n "${!name}" ]; then
              echo "$name=present"
            else
              echo "$name=missing"
            fi
          done
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check both production domains
        shell: bash
        run: |
          set -euo pipefail
          for base in https://fabrictrad.com https://www.fabrictrad.com; do
            status=$(curl --silent --show-error --connect-timeout 10 --max-time 30 \
              --output /tmp/status.json --write-out '%{http_code}' \
              "$base/api/ai/drape-on")
            body=$(cat /tmp/status.json)
            echo "$base STATUS=$status BODY=$body"
            test "$status" = '200'
            grep -q '"configured":true' /tmp/status.json
            grep -q 'gpt-image-2' /tmp/status.json
          done
