name: Quality and security checks

on:
  pull_request:
  push:
    branches:
      - 'agent/diagnose-live-demo'

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Inspect live FabricTrad authentication
        shell: bash
        run: |
          set -u

          inspect_domain() {
            base_url="$1"
            safe_name=$(echo "$base_url" | sed 's#https://##; s#[^a-zA-Z0-9]#-#g')
            echo "===== DOMAIN $base_url ====="

            login_status=$(curl --silent --show-error --connect-timeout 10 --max-time 30 \
              --dump-header "/tmp/${safe_name}-login.headers" \
              --output "/tmp/${safe_name}-login.html" \
              --write-out '%{http_code}' "$base_url/login" || true)
            echo "LOGIN_STATUS=$login_status"
            head -n 20 "/tmp/${safe_name}-login.headers" 2>/dev/null || true
            if grep -qi 'Password reset codes are sent only' "/tmp/${safe_name}-login.html"; then
              echo 'RESET_NOTICE_PRESENT=yes'
            else
              echo 'RESET_NOTICE_PRESENT=no_or_client_rendered'
            fi

            buyer_status=$(curl --silent --show-error --connect-timeout 10 --max-time 30 \
              --dump-header "/tmp/${safe_name}-buyer.headers" \
              --output "/tmp/${safe_name}-buyer.json" \
              --cookie-jar "/tmp/${safe_name}-buyer.cookies" \
              --write-out '%{http_code}' \
              --header 'Content-Type: application/json' \
              --data '{"email":"demo.buyer@fabrictrad.com","password":"FabricDemo@2026"}' \
              "$base_url/api/auth/demo-session" || true)
            echo "BUYER_STATUS=$buyer_status"
            echo 'BUYER_HEADERS:'
            cat "/tmp/${safe_name}-buyer.headers" 2>/dev/null || true
            echo 'BUYER_BODY:'
            cat "/tmp/${safe_name}-buyer.json" 2>/dev/null || true
            echo
            echo 'BUYER_COOKIES:'
            cat "/tmp/${safe_name}-buyer.cookies" 2>/dev/null || true

            buyer_marketplace_status=$(curl --silent --show-error --connect-timeout 10 --max-time 30 \
              --dump-header "/tmp/${safe_name}-marketplace.headers" \
              --output /dev/null --write-out '%{http_code}' \
              --cookie "/tmp/${safe_name}-buyer.cookies" --max-redirs 0 \
              "$base_url/marketplace" || true)
            echo "BUYER_MARKETPLACE_STATUS=$buyer_marketplace_status"
            cat "/tmp/${safe_name}-marketplace.headers" 2>/dev/null || true

            seller_status=$(curl --silent --show-error --connect-timeout 10 --max-time 30 \
              --dump-header "/tmp/${safe_name}-seller.headers" \
              --output "/tmp/${safe_name}-seller.json" \
              --cookie-jar "/tmp/${safe_name}-seller.cookies" \
              --write-out '%{http_code}' \
              --header 'Content-Type: application/json' \
              --data '{"email":"demo.seller@fabrictrad.com","password":"FabricDemo@2026"}' \
              "$base_url/api/auth/demo-session" || true)
            echo "SELLER_STATUS=$seller_status"
            echo 'SELLER_HEADERS:'
            cat "/tmp/${safe_name}-seller.headers" 2>/dev/null || true
            echo 'SELLER_BODY:'
            cat "/tmp/${safe_name}-seller.json" 2>/dev/null || true
            echo
            echo 'SELLER_COOKIES:'
            cat "/tmp/${safe_name}-seller.cookies" 2>/dev/null || true

            seller_dashboard_status=$(curl --silent --show-error --connect-timeout 10 --max-time 30 \
              --dump-header "/tmp/${safe_name}-seller-dashboard.headers" \
              --output /dev/null --write-out '%{http_code}' \
              --cookie "/tmp/${safe_name}-seller.cookies" --max-redirs 0 \
              "$base_url/seller-dashboard" || true)
            echo "SELLER_DASHBOARD_STATUS=$seller_dashboard_status"
            cat "/tmp/${safe_name}-seller-dashboard.headers" 2>/dev/null || true
          }

          inspect_domain 'https://fabrictrad.com'
          inspect_domain 'https://www.fabrictrad.com'
