name: Quality and security checks

on:
  pull_request:
  push:
    branches:
      - main
      - 'agent/**'

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      NEXT_PUBLIC_ENABLE_GOOGLE_AUTH: 'false'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/ui-functionality-fixes
          fetch-depth: 0
      - name: Apply reviewed remaining UI files
        id: applyui
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          {
            set -euo pipefail
            ls -la .github/patches/plain
            cat .github/patches/plain/part*.patch > /tmp/final-ui.patch
            wc -l /tmp/final-ui.patch
            EXCLUDES=(
              --exclude=src/app/product-detail/components/SellerCard.tsx
              --exclude=src/lib/recommendations.ts
            )
            git apply --check "${EXCLUDES[@]}" /tmp/final-ui.patch
            git apply "${EXCLUDES[@]}" /tmp/final-ui.patch
            python - <<'PY'
            from pathlib import Path
            path = Path('src/app/product-detail/components/FabricDrapeViewer.tsx')
            text = path.read_text()
            text = text.replace(
                "import { useEffect, useMemo, useRef, useState } from 'react';",
                "import { useEffect, useMemo, useRef, useState, type ChangeEvent } from 'react';",
            )
            text = text.replace('React.ChangeEvent<HTMLInputElement>', 'ChangeEvent<HTMLInputElement>')
            path.write_text(text)
            PY
          } 2>&1 | tee apply-ui.log
      - name: Upload apply diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: final-ui-apply-log
          path: apply-ui.log
          if-no-files-found: error
      - name: Stop after apply failure
        if: steps.applyui.outcome == 'failure'
        run: exit 1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install --no-audit --no-fund --package-lock=false
      - name: Type check
        run: npm run type-check
      - name: Lint
        run: npm run lint
      - name: Production build
        run: npm run build
