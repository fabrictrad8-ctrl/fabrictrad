name: Quality and security checks

on:
  pull_request:
  push:
    branches:
      - main
      - 'agent/**'

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key
      SUPABASE_SERVICE_ROLE_KEY: test-service-role-key
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      NEXT_PUBLIC_ENABLE_GOOGLE_AUTH: 'false'
      ADMIN_EMAIL: fabrictrad8@gmail.com
      OPENAI_API_KEY: test-openai-image-key
      OPENAI_DRAPE_IMAGE_MODEL: gpt-image-2
      OPENAI_DRAPE_IMAGE_SIZE: 1024x1536
      OPENAI_DRAPE_IMAGE_QUALITY: medium
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install --no-audit --no-fund --package-lock=false --legacy-peer-deps
      - name: Type check
        run: npm run type-check
      - name: Lint
        run: npm run lint
      - name: Production build
        run: npm run build
      - name: Authentication and AI drape source checks
        shell: bash
        run: |
          set -euo pipefail

          login_source='src/app/login/EmailOtpLoginClient.tsx'
          auth_context_source='src/contexts/AuthContext.tsx'
          demo_route_source='src/app/api/auth/demo-session/route.ts'
          callback_source='src/app/auth/callback/route.ts'
          middleware_source='src/middleware.ts'
          logo_source='src/components/ui/AppLogo.tsx'
          drape_ui_source='src/app/product-detail/components/VirtualColourDrapeStudio.tsx'
          drape_route_source='src/app/api/ai/drape-on/route.ts'
          deploy_source='.github/workflows/deploy-cloudflare.yml'

          grep -q 'Forgot password?' "$login_source"
          grep -q 'Continue with Google' "$login_source"
          grep -q 'current-password' "$login_source"
          grep -Fq "return '/marketplace';" "$login_source"
          grep -Fq 'result?.isDemo' "$login_source"
          grep -Fq "'/api/auth/demo-session'" "$auth_context_source"
          grep -Fq "'demo.buyer@fabrictrad.com'" "$demo_route_source"
          grep -Fq "'demo.seller@fabrictrad.com'" "$demo_route_source"
          grep -Fq "const DEMO_COOKIE_NAME = 'fabrictrad_demo_role';" "$middleware_source"
          grep -Fq 'return `${origin}/marketplace`;' "$callback_source"
          grep -Fq "return '/marketplace';" "$middleware_source"
          grep -Fq ": '/marketplace'" "$logo_source"

          grep -Fq "fetch('/api/ai/drape-on'" "$drape_ui_source"
          grep -Fq 'Generate AI drape' "$drape_ui_source"
          grep -Fq 'Your uploaded photo' "$drape_ui_source"
          grep -Fq 'Choose the garment' "$drape_ui_source"
          grep -Fq 'AI-generated garment using the selected fabric' "$drape_ui_source"
          grep -Fq "'gpt-image-2'" "$drape_route_source"
          grep -Fq "form.append('image[]', person.blob" "$drape_route_source"
          grep -Fq "form.append('image[]', fabric.blob" "$drape_route_source"
          grep -Fq 'flat colour block' "$drape_route_source"
          grep -Fq "const DEMO_COOKIE_NAME = 'fabrictrad_demo_role';" "$drape_route_source"
          grep -Fq 'OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}' "$deploy_source"
          grep -Fq 'Verify live AI drape-on configuration' "$deploy_source"

          if grep -q 'clipPath' "$drape_ui_source"; then
            echo 'The AI drape studio still contains the old polygon overlay.'
            exit 1
          fi
          if grep -q 'photoFilter' "$drape_ui_source"; then
            echo 'The AI drape studio still contains the old colour-filter simulation.'
            exit 1
          fi
          if grep -qi 'Your photo is not sent for AI generation' "$drape_ui_source"; then
            echo 'The AI drape studio still claims images are not sent to the generator.'
            exit 1
          fi
          if grep -qi 'Click a fabric or shade to drape it' "$drape_ui_source"; then
            echo 'The old colour-comparison tool is still being rendered as drape-on.'
            exit 1
          fi
          if grep -qi 'Password reset codes are sent only' "$login_source"; then
            echo 'The removed password-reset notice was restored unexpectedly.'
            exit 1
          fi
          if grep -qi 'Explore a demo' "$login_source"; then
            echo 'Public demo shortcut buttons must not be rendered.'
            exit 1
          fi
          if grep -qi 'Admin portal' "$login_source"; then
            echo 'A separate administrator entry point must not be rendered.'
            exit 1
          fi

          npm run start > /tmp/fabrictrad-server.log 2>&1 &
          server_pid=$!
          cleanup() {
            kill "$server_pid" 2>/dev/null || true
            wait "$server_pid" 2>/dev/null || true
          }
          trap cleanup EXIT

          ready=false
          for _ in $(seq 1 40); do
            if curl --fail --silent --show-error http://127.0.0.1:3000/login > /tmp/login.html; then
              ready=true
              break
            fi
            sleep 1
          done
          if [ "$ready" != "true" ]; then
            cat /tmp/fabrictrad-server.log
            exit 1
          fi

          ai_status=$(curl --silent --show-error --output /tmp/ai-drape-status.json \
            --write-out '%{http_code}' http://127.0.0.1:3000/api/ai/drape-on)
          test "$ai_status" = "200"
          grep -q '"configured":true' /tmp/ai-drape-status.json
          grep -q 'gpt-image-2' /tmp/ai-drape-status.json

          invalid_otp_status=$(curl --silent --show-error --output /tmp/invalid-otp.json \
            --write-out '%{http_code}' --header 'Content-Type: application/json' \
            --data '{}' http://127.0.0.1:3000/api/auth/email-otp/request)
          test "$invalid_otp_status" = "400"
          grep -q 'Email is required' /tmp/invalid-otp.json

          invalid_demo_status=$(curl --silent --show-error --output /tmp/invalid-demo.json \
            --write-out '%{http_code}' --header 'Content-Type: application/json' \
            --data '{"email":"demo.buyer@fabrictrad.com","password":"wrong-password"}' \
            http://127.0.0.1:3000/api/auth/demo-session)
          test "$invalid_demo_status" = "401"
          grep -q 'Invalid login credentials' /tmp/invalid-demo.json

          buyer_status=$(curl --silent --show-error --output /tmp/buyer-session.json \
            --write-out '%{http_code}' --cookie-jar /tmp/buyer.cookies \
            --header 'Content-Type: application/json' \
            --data '{"email":"demo.buyer@fabrictrad.com","password":"FabricDemo@2026"}' \
            http://127.0.0.1:3000/api/auth/demo-session)
          test "$buyer_status" = "200"
          grep -q '"role":"buyer"' /tmp/buyer-session.json
          grep -q 'fabrictrad_demo_role' /tmp/buyer.cookies

          buyer_marketplace_status=$(curl --silent --show-error --output /tmp/buyer-marketplace.html \
            --write-out '%{http_code}' --cookie /tmp/buyer.cookies --max-redirs 0 \
            http://127.0.0.1:3000/marketplace)
          test "$buyer_marketplace_status" = "200"

          buyer_to_seller_status=$(curl --silent --show-error --dump-header /tmp/buyer-to-seller.headers \
            --output /dev/null --write-out '%{http_code}' --cookie /tmp/buyer.cookies --max-redirs 0 \
            http://127.0.0.1:3000/seller-dashboard)
          test "$buyer_to_seller_status" = "307" -o "$buyer_to_seller_status" = "308"
          grep -qi '^location: .*marketplace' /tmp/buyer-to-seller.headers

          seller_status=$(curl --silent --show-error --output /tmp/seller-session.json \
            --write-out '%{http_code}' --cookie-jar /tmp/seller.cookies \
            --header 'Content-Type: application/json' \
            --data '{"email":"demo.seller@fabrictrad.com","password":"FabricDemo@2026"}' \
            http://127.0.0.1:3000/api/auth/demo-session)
          test "$seller_status" = "200"
          grep -q '"role":"seller"' /tmp/seller-session.json
          grep -q 'fabrictrad_demo_role' /tmp/seller.cookies

          seller_dashboard_status=$(curl --silent --show-error --output /tmp/seller-dashboard.html \
            --write-out '%{http_code}' --cookie /tmp/seller.cookies --max-redirs 0 \
            http://127.0.0.1:3000/seller-dashboard)
          test "$seller_dashboard_status" = "200"

          seller_to_buyer_status=$(curl --silent --show-error --dump-header /tmp/seller-to-buyer.headers \
            --output /dev/null --write-out '%{http_code}' --cookie /tmp/seller.cookies --max-redirs 0 \
            http://127.0.0.1:3000/buyer-dashboard)
          test "$seller_to_buyer_status" = "307" -o "$seller_to_buyer_status" = "308"
          grep -qi '^location: .*seller-dashboard' /tmp/seller-to-buyer.headers

          clear_status=$(curl --silent --show-error --output /tmp/clear-demo.json \
            --write-out '%{http_code}' --cookie /tmp/buyer.cookies --request DELETE \
            http://127.0.0.1:3000/api/auth/demo-session)
          test "$clear_status" = "200"

          retired_ensure_status=$(curl --silent --show-error --output /tmp/retired-ensure.txt \
            --write-out '%{http_code}' --header 'Content-Type: application/json' \
            --data '{"email":"demo.buyer@fabrictrad.com","password":"FabricDemo@2026"}' \
            http://127.0.0.1:3000/api/auth/demo-account/ensure)
          test "$retired_ensure_status" = "404" -o "$retired_ensure_status" = "410"
      - name: OpenNext Cloudflare compatibility build
        run: npm run build:sites
