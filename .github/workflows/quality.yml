name: Quality and security checks

on:
  pull_request:
  push:
    branches:
      - 'agent/diagnose-live-demo'

permissions:
  contents: read

jobs:
  apex:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Inspect fabrictrad.com
        shell: bash
        run: |
          base='https://fabrictrad.com'
          login=$(curl -sS -o /dev/null -w '%{http_code}' "$base/login" || true)
          buyer=$(curl -sS -c /tmp/buyer.cookies -o /tmp/buyer.json -w '%{http_code}' -H 'Content-Type: application/json' --data '{"email":"demo.buyer@fabrictrad.com","password":"FabricDemo@2026"}' "$base/api/auth/demo-session" || true)
          marketplace=$(curl -sS -b /tmp/buyer.cookies -o /dev/null -w '%{http_code}' --max-redirs 0 "$base/marketplace" || true)
          seller=$(curl -sS -c /tmp/seller.cookies -o /tmp/seller.json -w '%{http_code}' -H 'Content-Type: application/json' --data '{"email":"demo.seller@fabrictrad.com","password":"FabricDemo@2026"}' "$base/api/auth/demo-session" || true)
          dashboard=$(curl -sS -b /tmp/seller.cookies -o /dev/null -w '%{http_code}' --max-redirs 0 "$base/seller-dashboard" || true)
          echo "LOGIN=$login BUYER=$buyer BUYER_BODY=$(cat /tmp/buyer.json 2>/dev/null || true) BUYER_COOKIE=$(grep -c fabrictrad_demo_role /tmp/buyer.cookies 2>/dev/null || true) MARKETPLACE=$marketplace SELLER=$seller SELLER_BODY=$(cat /tmp/seller.json 2>/dev/null || true) SELLER_COOKIE=$(grep -c fabrictrad_demo_role /tmp/seller.cookies 2>/dev/null || true) DASHBOARD=$dashboard"
  www:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Inspect www.fabrictrad.com
        shell: bash
        run: |
          base='https://www.fabrictrad.com'
          login=$(curl -sS -o /dev/null -w '%{http_code}' "$base/login" || true)
          buyer=$(curl -sS -c /tmp/buyer.cookies -o /tmp/buyer.json -w '%{http_code}' -H 'Content-Type: application/json' --data '{"email":"demo.buyer@fabrictrad.com","password":"FabricDemo@2026"}' "$base/api/auth/demo-session" || true)
          marketplace=$(curl -sS -b /tmp/buyer.cookies -o /dev/null -w '%{http_code}' --max-redirs 0 "$base/marketplace" || true)
          seller=$(curl -sS -c /tmp/seller.cookies -o /tmp/seller.json -w '%{http_code}' -H 'Content-Type: application/json' --data '{"email":"demo.seller@fabrictrad.com","password":"FabricDemo@2026"}' "$base/api/auth/demo-session" || true)
          dashboard=$(curl -sS -b /tmp/seller.cookies -o /dev/null -w '%{http_code}' --max-redirs 0 "$base/seller-dashboard" || true)
          echo "LOGIN=$login BUYER=$buyer BUYER_BODY=$(cat /tmp/buyer.json 2>/dev/null || true) BUYER_COOKIE=$(grep -c fabrictrad_demo_role /tmp/buyer.cookies 2>/dev/null || true) MARKETPLACE=$marketplace SELLER=$seller SELLER_BODY=$(cat /tmp/seller.json 2>/dev/null || true) SELLER_COOKIE=$(grep -c fabrictrad_demo_role /tmp/seller.cookies 2>/dev/null || true) DASHBOARD=$dashboard"
  notice:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Inspect deployed login JavaScript
        shell: bash
        run: |
          for base in https://fabrictrad.com https://www.fabrictrad.com; do
            curl -sS "$base/login" -o /tmp/login.html
            : > /tmp/login-assets.js
            grep -oE 'src="[^"]+\.js[^"]*"' /tmp/login.html | sed 's/^src="//; s/"$//' | sort -u | while read -r asset; do
              case "$asset" in
                http*) url="$asset" ;;
                *) url="$base$asset" ;;
              esac
              curl -sS "$url" >> /tmp/login-assets.js || true
            done
            if grep -qi 'Password reset codes are sent only' /tmp/login.html /tmp/login-assets.js; then
              echo "$base RESET_NOTICE_PRESENT=yes"
            else
              echo "$base RESET_NOTICE_PRESENT=no"
            fi
          done
  auxiliary:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Inspect remaining live checks
        shell: bash
        run: |
          for base in https://fabrictrad.com https://www.fabrictrad.com; do
            public=$(curl -sS -D /tmp/public.headers -o /dev/null -w '%{http_code}' --max-redirs 0 "$base/marketplace" || true)
            public_location=$(grep -i '^location:' /tmp/public.headers | tr -d '\r\n' || true)
            admin=$(curl -sS -D /tmp/admin.headers -o /dev/null -w '%{http_code}' --max-redirs 0 "$base/admin-login" || true)
            admin_location=$(grep -i '^location:' /tmp/admin.headers | tr -d '\r\n' || true)
            google=$(curl -sS -o /tmp/google.json -w '%{http_code}' "$base/api/auth/google/status" || true)
            home=$(curl -sS -o /dev/null -w '%{http_code}' "$base/" || true)
            echo "$base HOME=$home PUBLIC_MARKETPLACE=$public $public_location ADMIN_LOGIN=$admin $admin_location GOOGLE=$google GOOGLE_BODY=$(cat /tmp/google.json 2>/dev/null || true)"
          done
