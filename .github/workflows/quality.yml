name: Quality and security checks

on:
  pull_request:
  push:
    branches:
      - main
      - 'agent/**'

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key
      SUPABASE_SERVICE_ROLE_KEY: test-service-role-key
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      NEXT_PUBLIC_ENABLE_GOOGLE_AUTH: 'false'
      ADMIN_EMAIL: fabrictrad8@gmail.com
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install --no-audit --no-fund --package-lock=false --legacy-peer-deps
      - name: Type check
        run: npm run type-check
      - name: Lint
        run: npm run lint
      - name: Production build
        run: npm run build
      - name: Authentication source and route smoke tests
        shell: bash
        run: |
          set -euo pipefail

          login_source='src/app/login/EmailOtpLoginClient.tsx'
          auth_context_source='src/contexts/AuthContext.tsx'
          demo_account_source='src/app/api/auth/demo-account/ensure/route.ts'
          callback_source='src/app/auth/callback/route.ts'
          middleware_source='src/middleware.ts'
          logo_source='src/components/ui/AppLogo.tsx'

          grep -q 'Forgot password?' "$login_source"
          grep -q 'Continue with Google' "$login_source"
          grep -q 'current-password' "$login_source"
          grep -Fq "return '/marketplace';" "$login_source"
          grep -Fq 'return `${origin}/marketplace`;' "$callback_source"
          grep -Fq "return '/marketplace';" "$middleware_source"
          grep -Fq ": '/marketplace'" "$logo_source"
          grep -Fq "'/api/auth/demo-account/ensure'" "$auth_context_source"
          grep -Fq "'demo.buyer@fabrictrad.com'" "$demo_account_source"
          grep -Fq "'demo.seller@fabrictrad.com'" "$demo_account_source"
          grep -Fq "role: 'buyer'" "$demo_account_source"
          grep -Fq "role: 'seller'" "$demo_account_source"
          if grep -qi 'Explore a demo' "$login_source"; then
            echo 'Public demo access must not be rendered.'
            exit 1
          fi
          if grep -qi 'Admin portal' "$login_source"; then
            echo 'A separate administrator entry point must not be rendered.'
            exit 1
          fi

          npm run start > /tmp/fabrictrad-server.log 2>&1 &
          server_pid=$!
          cleanup() {
            kill "$server_pid" 2>/dev/null || true
            wait "$server_pid" 2>/dev/null || true
          }
          trap cleanup EXIT

          ready=false
          for _ in $(seq 1 40); do
            if curl --fail --silent --show-error http://127.0.0.1:3000/login > /tmp/login.html; then
              ready=true
              break
            fi
            sleep 1
          done
          if [ "$ready" != "true" ]; then
            cat /tmp/fabrictrad-server.log
            exit 1
          fi

          marketplace_status=$(curl --silent --show-error --output /dev/null \
            --write-out '%{http_code}' --max-redirs 0 http://127.0.0.1:3000/marketplace)
          test "$marketplace_status" = "307" -o "$marketplace_status" = "308"

          invalid_otp_status=$(curl --silent --show-error --output /tmp/invalid-otp.json \
            --write-out '%{http_code}' --header 'Content-Type: application/json' \
            --data '{}' http://127.0.0.1:3000/api/auth/email-otp/request)
          test "$invalid_otp_status" = "400"
          grep -q 'Email is required' /tmp/invalid-otp.json

          missing_demo_status=$(curl --silent --show-error --output /tmp/missing-demo.json \
            --write-out '%{http_code}' --header 'Content-Type: application/json' \
            --data '{}' http://127.0.0.1:3000/api/auth/demo-account/ensure)
          test "$missing_demo_status" = "400"
          grep -q 'Email and password are required' /tmp/missing-demo.json

          invalid_demo_status=$(curl --silent --show-error --output /tmp/invalid-demo.json \
            --write-out '%{http_code}' --header 'Content-Type: application/json' \
            --data '{"email":"demo.buyer@fabrictrad.com","password":"wrong-password"}' \
            http://127.0.0.1:3000/api/auth/demo-account/ensure)
          test "$invalid_demo_status" = "401"
          grep -q 'Invalid login credentials' /tmp/invalid-demo.json

          disabled_legacy_demo_status=$(curl --silent --show-error --output /tmp/disabled-demo.txt \
            --write-out '%{http_code}' --header 'Content-Type: application/json' \
            --data '{"email":"demo.buyer@fabrictrad.com","password":"FabricDemo@2026"}' \
            http://127.0.0.1:3000/api/auth/demo-session)
          case "$disabled_legacy_demo_status" in
            404|410) ;;
            *)
              echo "Legacy demo endpoint unexpectedly returned $disabled_legacy_demo_status"
              cat /tmp/disabled-demo.txt
              exit 1
              ;;
          esac
      - name: OpenNext Cloudflare compatibility build
        run: npm run build:sites
