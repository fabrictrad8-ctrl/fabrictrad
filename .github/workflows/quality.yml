name: Apply, validate and publish UI overhaul

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - agent/ui-functionality-fixes
  workflow_dispatch:

concurrency:
  group: fabrictrad-ui-finalizer
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  apply-build-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      NEXT_PUBLIC_ENABLE_GOOGLE_AUTH: 'false'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/ui-functionality-fixes
          fetch-depth: 0

      - name: Apply verified state, language and theme patches
        shell: bash
        run: |
          set -euo pipefail
          cat .github/patches/plain/part*.patch > /tmp/final-ui.patch
          for path in src/app/buyer-registration/components/BuyerRegistrationFlow.tsx src/app/profile/ProfilePageClient.tsx src/app/seller-registration/components/SellerRegistrationFlow.tsx src/styles/tailwind.css
          do
            git apply --check --include="$path" /tmp/final-ui.patch
            git apply --include="$path" /tmp/final-ui.patch
          done

      - name: Connect redesigned landing page and repair assembled types
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import re

          home = Path('src/app/components/HomeExperience.tsx')
          text = home.read_text()
          marker = "import TrustSection from '@/app/components/TrustSection';"
          modern_import = "import ModernLandingPage from '@/app/components/ModernLandingPage';"
          if modern_import not in text:
              text = text.replace(marker, marker + "\n" + modern_import)
          replacement = "function PublicBrandHome() {\n  return <ModernLandingPage />;\n}\n\nfunction SellerHome()"
          text, count = re.subn(
              r"function PublicBrandHome\(\) \{.*?\n\}\n\nfunction SellerHome\(\)",
              replacement,
              text,
              count=1,
              flags=re.S,
          )
          if count != 1:
              raise RuntimeError('Could not replace the legacy public landing page')
          home.write_text(text)

          buyer = Path('src/app/buyer-registration/components/BuyerRegistrationFlow.tsx')
          text = buyer.read_text()
          text = text.replace('const { data, error } = await signUp({', 'const data = await signUp({')
          text = text.replace('      if (error) throw error;\n', '')
          buyer.write_text(text)

          profile = Path('src/app/profile/ProfilePageClient.tsx')
          text = profile.read_text()
          anchor = "  buyer: { label: 'Buyer', icon: 'ShoppingBagIcon', color: 'text-primary' },"
          addition = "\n  admin_staff: { label: 'Admin Staff', icon: 'ShieldCheckIcon', color: 'text-error' },"
          if 'admin_staff:' not in text:
              if anchor not in text:
                  raise RuntimeError('Could not locate the profile role label map')
              text = text.replace(anchor, anchor + addition)
          profile.write_text(text)
          PY

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-audit --no-fund --package-lock=false

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Production build
        run: npm run build

      - name: Remove delivery scaffolding and restore strict CI
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .github/patches
          rm -f .github/workflows/apply-final-ui.yml
          echo '' | base64 --decode > .github/workflows/quality.yml

      - name: Commit validated implementation
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "FabricTrad Automation"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Publish responsive UI, regional preferences and drape studio"
          git push origin HEAD:agent/ui-functionality-fixes
