name: Quality and security checks

on:
  pull_request:
  push:
    branches:
      - main
      - 'agent/**'

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/ui-functionality-fixes
      - name: Assemble final UI patch
        run: cat .github/patches/plain/part*.patch > /tmp/final-ui.patch
      - name: Verify buyer registration
        run: git apply --check --include=src/app/buyer-registration/components/BuyerRegistrationFlow.tsx /tmp/final-ui.patch
      - name: Verify profile preferences
        run: git apply --check --include=src/app/profile/ProfilePageClient.tsx /tmp/final-ui.patch
      - name: Verify seller registration
        run: git apply --check --include=src/app/seller-registration/components/SellerRegistrationFlow.tsx /tmp/final-ui.patch
      - name: Verify theme CSS
        run: git apply --check --include=src/styles/tailwind.css /tmp/final-ui.patch
