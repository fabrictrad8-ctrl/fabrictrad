name: Quality and security checks

on:
  pull_request:
  push:
    branches:
      - 'agent/diagnose-live-demo'

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Inspect live FabricTrad authentication
        run: bash scripts/live-auth-diagnostic.sh
