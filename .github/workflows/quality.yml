name: Quality and security checks

on:
  pull_request:
  push:
    branches:
      - main
      - 'agent/**'

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      NEXT_PUBLIC_ENABLE_GOOGLE_AUTH: 'false'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/ui-functionality-fixes
          fetch-depth: 0
      - name: Apply reviewed UI bundle
        if: hashFiles('.github/patches/final-ui.patch.gz.b64') != ''
        shell: bash
        run: |
          set -euo pipefail
          base64 --decode .github/patches/final-ui.patch.gz.b64 | gzip --decompress > /tmp/final-ui.patch
          git apply --check /tmp/final-ui.patch
          git apply /tmp/final-ui.patch
          rm -f .github/patches/final-ui.patch.gz.b64 .github/workflows/apply-final-ui.yml
          cat > .github/workflows/quality.yml <<'YAML'
          name: Quality and security checks

          on:
            pull_request:
            push:
              branches:
                - main
                - 'agent/**'

          permissions:
            contents: read

          jobs:
            check:
              runs-on: ubuntu-latest
              timeout-minutes: 20
              env:
                NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
                NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key
                NEXT_PUBLIC_SITE_URL: http://localhost:3000
                NEXT_PUBLIC_ENABLE_GOOGLE_AUTH: 'false'
              steps:
                - uses: actions/checkout@v4
                - uses: actions/setup-node@v4
                  with:
                    node-version: 22
                - name: Install dependencies
                  run: npm install --no-audit --no-fund --package-lock=false
                - name: Type check
                  run: npm run type-check
                - name: Lint
                  run: npm run lint
                - name: Production build
                  run: npm run build
          YAML
          git config user.name "FabricTrad Automation"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Complete responsive UI, preferences and AI drape studio"
          git push origin HEAD:agent/ui-functionality-fixes
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install --no-audit --no-fund --package-lock=false
      - name: Type check
        run: npm run type-check
      - name: Lint
        run: npm run lint
      - name: Production build
        run: npm run build
