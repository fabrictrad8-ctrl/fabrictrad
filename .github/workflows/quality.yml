name: Quality and security checks

on:
  pull_request:
  push:
    branches:
      - main
      - 'agent/**'

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key
      SUPABASE_SERVICE_ROLE_KEY: test-service-role-key
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      NEXT_PUBLIC_ENABLE_GOOGLE_AUTH: 'false'
      ADMIN_EMAIL: fabrictrad8@gmail.com
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install --no-audit --no-fund --package-lock=false --legacy-peer-deps
      - name: Type check
        id: typecheck
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run type-check 2>&1 | tee typecheck.log
      - name: Upload type-check diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-diagnostics
          path: typecheck.log
          if-no-files-found: error
          retention-days: 1
      - name: Stop after failed type check
        if: steps.typecheck.outcome != 'success'
        run: exit 1
      - name: Lint
        run: npm run lint
      - name: Production build
        run: npm run build
      - name: OpenNext Cloudflare build
        id: cloudflare_build
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run build:sites 2>&1 | tee cloudflare-build.log
      - name: Upload Cloudflare build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cloudflare-build-diagnostics
          path: cloudflare-build.log
          if-no-files-found: error
          retention-days: 1
      - name: Stop after failed Cloudflare build
        if: steps.cloudflare_build.outcome != 'success'
        run: exit 1
