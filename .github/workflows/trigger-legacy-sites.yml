name: Verify archived Sites deployment

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  verify:
    if: github.event.head_commit.message != 'Record immediate live deployment check [skip ci]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Check the live custom domain
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .openai
          http=$(curl -L --connect-timeout 15 --max-time 60 --retry 2 --retry-all-errors \
            -o /tmp/fabrictrad-live.html -w '%{http_code}' https://fabrictrad.com/ || true)
          marker="stale"
          if grep -q 'Trusted across textile hubs' /tmp/fabrictrad-live.html 2>/dev/null; then
            marker="redesigned"
          fi
          {
            echo "checked_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "source_commit=${GITHUB_SHA}"
            echo "http_status=${http}"
            echo "landing_marker=${marker}"
          } > .openai/deployment-verification.txt
      - name: Record verification result
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "Das Bot"
          git config user.email "das-bot@users.noreply.github.com"
          git add .openai/deployment-verification.txt
          git commit -m "Record immediate live deployment check [skip ci]"
          git push origin HEAD:main
