name: Trigger archived Sites deployment

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  trigger:
    if: github.event.head_commit.message != 'Trigger archived Sites deployment' && github.event.head_commit.message != 'Record archived Sites deployment verification [skip ci]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Reproduce the original Sites deployment marker
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "Das Bot"
          git config user.email "das-bot@users.noreply.github.com"
          git commit --allow-empty -m "Trigger archived Sites deployment"
          git push origin HEAD:main

  verify:
    if: github.event.head_commit.message == 'Trigger archived Sites deployment'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Wait for the archived Sites host
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .openai
          marker="stale"
          http="000"
          for attempt in $(seq 1 20); do
            http=$(curl -L --connect-timeout 15 --max-time 60 --retry 2 --retry-all-errors \
              -o /tmp/fabrictrad-live.html -w '%{http_code}' https://fabrictrad.com/ || true)
            if grep -q 'Trusted across textile hubs' /tmp/fabrictrad-live.html 2>/dev/null; then
              marker="redesigned"
              break
            fi
            sleep 20
          done
          {
            echo "checked_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "trigger_commit=${GITHUB_SHA}"
            echo "http_status=${http}"
            echo "landing_marker=${marker}"
          } > .openai/deployment-verification.txt
      - name: Record verification result
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "Das Bot"
          git config user.email "das-bot@users.noreply.github.com"
          git add .openai/deployment-verification.txt
          git commit -m "Record archived Sites deployment verification [skip ci]"
          git push origin HEAD:main
