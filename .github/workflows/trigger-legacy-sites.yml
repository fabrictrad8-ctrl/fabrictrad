name: Trigger archived Sites deployment

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  trigger:
    if: github.event.head_commit.message != 'Trigger archived Sites deployment'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Reproduce the original Sites deployment marker
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "Das Bot"
          git config user.email "das-bot@users.noreply.github.com"
          git commit --allow-empty -m "Trigger archived Sites deployment"
          git push origin HEAD:main
