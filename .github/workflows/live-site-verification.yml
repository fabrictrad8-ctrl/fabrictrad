name: Verify live FabricTrad deployment

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  check-cloudflare-credentials:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Record credential availability without revealing values
        shell: bash
        run: |
          mkdir -p cloudflare-credentials
          if [ -n "$CLOUDFLARE_API_TOKEN" ]; then
            echo 'api_token_present=yes' >> cloudflare-credentials/status.txt
          else
            echo 'api_token_present=no' >> cloudflare-credentials/status.txt
          fi
          if [ -n "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo 'account_id_present=yes' >> cloudflare-credentials/status.txt
          else
            echo 'account_id_present=no' >> cloudflare-credentials/status.txt
          fi
      - name: Upload credential status
        uses: actions/upload-artifact@v4
        with:
          name: fabrictrad-cloudflare-credential-status-${{ github.run_id }}
          path: cloudflare-credentials/status.txt
          if-no-files-found: error

  verify-live-site:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Fetch custom and Netlify domains
        shell: bash
        run: |
          set -uo pipefail
          mkdir -p live-check
          curl -L --connect-timeout 15 --max-time 60 --retry 2 --retry-all-errors \
            -D live-check/custom-headers.txt \
            -o live-check/custom.html \
            -w 'custom_http=%{http_code}\ncustom_url=%{url_effective}\n' \
            https://fabrictrad.com/ | tee live-check/custom-status.txt || true
          curl -L --connect-timeout 15 --max-time 60 --retry 2 --retry-all-errors \
            -D live-check/netlify-headers.txt \
            -o live-check/netlify.html \
            -w 'netlify_http=%{http_code}\nnetlify_url=%{url_effective}\n' \
            https://luxury-longma-ea8445.netlify.app/ | tee live-check/netlify-status.txt || true
          grep -q 'Trusted across textile hubs' live-check/custom.html \
            && echo 'custom_marker=redesigned' \
            || echo 'custom_marker=stale' | tee live-check/custom-marker.txt
          grep -q 'Trusted across textile hubs' live-check/netlify.html \
            && echo 'netlify_marker=redesigned' \
            || echo 'netlify_marker=stale' | tee live-check/netlify-marker.txt
      - name: Upload live verification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fabrictrad-live-verification-${{ github.run_id }}
          path: live-check
          if-no-files-found: error
          retention-days: 7
