name: Verify live FabricTrad deployment

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  inspect-cloudflare-deployment:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Capture deployment files and references
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p cloudflare-inspection
          find . -maxdepth 4 -type f \
            -not -path './.git/*' \
            -not -path './node_modules/*' \
            | sort > cloudflare-inspection/repo-files.txt
          grep -RInE 'wrangler|cloudflare|opennext|arati-cookie|CLOUDFLARE|build:sites' . \
            --exclude-dir=.git --exclude-dir=node_modules \
            > cloudflare-inspection/references.txt || true
          cp wrangler.jsonc cloudflare-inspection/wrangler.jsonc
          cp open-next.config.ts cloudflare-inspection/open-next.config.ts
          cp package.json cloudflare-inspection/package.json
      - name: Upload Cloudflare inspection
        uses: actions/upload-artifact@v4
        with:
          name: fabrictrad-cloudflare-inspection-${{ github.run_id }}
          path: cloudflare-inspection
          if-no-files-found: error

  verify-live-site:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Fetch custom and Netlify domains
        shell: bash
        run: |
          set -uo pipefail
          mkdir -p live-check

          curl -L --connect-timeout 15 --max-time 60 --retry 2 --retry-all-errors \
            -D live-check/custom-headers.txt \
            -o live-check/custom.html \
            -w 'custom_http=%{http_code}\ncustom_url=%{url_effective}\n' \
            https://fabrictrad.com/ | tee live-check/custom-status.txt || true

          curl -L --connect-timeout 15 --max-time 60 --retry 2 --retry-all-errors \
            -D live-check/netlify-headers.txt \
            -o live-check/netlify.html \
            -w 'netlify_http=%{http_code}\nnetlify_url=%{url_effective}\n' \
            https://luxury-longma-ea8445.netlify.app/ | tee live-check/netlify-status.txt || true

          grep -q 'Trusted across textile hubs' live-check/custom.html \
            && echo 'custom_marker=redesigned' \
            || echo 'custom_marker=stale' | tee live-check/custom-marker.txt

          grep -q 'Trusted across textile hubs' live-check/netlify.html \
            && echo 'netlify_marker=redesigned' \
            || echo 'netlify_marker=stale' | tee live-check/netlify-marker.txt

      - name: Upload live verification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fabrictrad-live-verification-${{ github.run_id }}
          path: live-check
          if-no-files-found: error
          retention-days: 7
