name: Apply final UI patch

on:
  push:
    branches:
      - agent/ui-functionality-fixes
    paths:
      - .github/patches/final-ui.patch.gz.b64
      - .github/workflows/apply-final-ui.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/ui-functionality-fixes
          fetch-depth: 0
      - name: Apply reviewed UI patch
        shell: bash
        run: |
          set -euo pipefail
          base64 --decode .github/patches/final-ui.patch.gz.b64 | gzip --decompress > /tmp/final-ui.patch
          git apply --check /tmp/final-ui.patch
          git apply /tmp/final-ui.patch
          rm -f .github/patches/final-ui.patch.gz.b64 .github/workflows/apply-final-ui.yml
          git config user.name "FabricTrad Automation"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Complete responsive UI, preferences and AI drape studio"
          git push origin HEAD:agent/ui-functionality-fixes
